<head>

  <title>Cat's Eyes - Gestion du Menu</title>

  <script>
    function injectToken() {
      if (window.location.hostname !== 'localhost') {
        // On injecte le token de manière répétée pour devancer le chargement de Decap
        localStorage.setItem('cms.token', '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');
      }
    }

    // Extraction immédiate
    injectToken();

    // On le ré-injecte toutes les 100ms pendant 2 secondes pour forcer Decap à le voir au boot
    const interval = setInterval(injectToken, 100);
    setTimeout(() => clearInterval(interval), 2000);
  </script>
