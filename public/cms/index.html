    class SupabaseGateBackend extends GitHubBackend.implementation {
      constructor(config, options) {
        super(config, options);
      }
      isConfirmingEmail() { return false; }
      authenticate() { return Promise.resolve({ token: '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' }); }
      logout() { return null; }
      getToken() { return Promise.resolve('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'); }
    }

    // On l'enregistre dans le moteur
    window.CMS.registerBackend('supabase-gate', SupabaseGateBackend);

  <script>
    // Force l'initialisation avec le fichier de configuration existant
    initCMS();
