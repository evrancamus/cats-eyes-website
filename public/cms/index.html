<head>

  <title>Cat's Eyes - Gestion du Menu</title>

  <!-- Script d'auto-connexion pour la production -->
  <script>
    if (window.location.hostname !== 'localhost') {
      localStorage.setItem('gotrue.user', JSON.stringify({
        token: {
          access_token: "PASSE",
          expires_at: Date.now() + 3600000
        }
      }));
    }
  </script>
</head>

  <!-- Script officiel de Decap CMS placé en bas du body pour attendre que le HTML soit chargé -->
